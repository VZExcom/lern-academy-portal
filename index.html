<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lern Academy — Stunden melden</title>
  <style>
    :root {
      --accent: #0e7c7b; --accent-strong: #0a5f5e; --ink: #0e1726; --muted: #5b6b7a;
      --line: #e3e8ee; --bg: #f5f7f9; --card: #ffffff; --good: #0f7b43; --danger: #c0362c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--ink);
      line-height: 1.5; padding: 16px; max-width: 640px; margin: 0 auto; }
    header { display: flex; align-items: center; gap: 12px; padding: 8px 0 20px; }
    .logo { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent); color: #fff; font-weight: 700; }
    h1 { font-size: 18px; } .sub { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
    .greet { font-size: 15px; } .greet b { color: var(--accent-strong); }
    .section-title { font-size: 13px; font-weight: 700; color: var(--accent-strong); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 6px; }
    label { display: block; font-size: 12px; font-weight: 600; margin: 10px 0 4px; color: var(--muted); }
    select, input, textarea { width: 100%; font-size: 16px; padding: 11px 12px; border: 1px solid var(--line);
      border-radius: 10px; background: #fff; color: var(--ink); font-family: inherit; }
    textarea { min-height: 84px; resize: vertical; line-height: 1.4; }
    select:focus, input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,124,123,.15); }
    .row { display: grid; grid-template-columns: 1fr 130px; gap: 10px; }
    .remain { margin-top: 6px; font-size: 13px; color: var(--muted); }
    .remain b { color: var(--ink); }
    button { font-size: 16px; font-weight: 700; border: none; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: .15s; }
    .btn-send { width: 100%; background: var(--accent); color: #fff; margin-top: 16px; }
    .btn-send:disabled { opacity: .5; cursor: default; }
    .btn-send.ok { background: var(--good); }
    .note-i { font-style: italic; font-size: 12px; color: var(--muted); margin-top: 6px; }
    .msg { text-align: center; color: var(--good); font-size: 13px; font-weight: 600; height: 18px; margin-top: 8px; opacity: 0; transition: opacity .2s; }
    .msg.show { opacity: 1; }
    .log { list-style: none; }
    .log li { display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: #f5f8f8; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-top: 8px; font-size: 14px; }
    .log li .what { font-weight: 600; }
    .log li .tick { color: var(--good); font-weight: 700; }
    .log li:first-child { animation: pop .18s ease, flash 1.3s ease; }
    @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes flash { from { background: #d7efe1; border-color: var(--good); } to { background: #f5f8f8; } }
    .empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }
    .muted { color: var(--muted); font-size: 13px; }
    .banner { padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 14px; }
    .banner.good { background: #e7f6ee; color: var(--good); }
    .banner.err { background: #fbeae9; color: var(--danger); }
    .center { text-align: center; padding: 40px 16px; color: var(--muted); }
    .foot { text-align: center; color: var(--muted); font-size: 12px; padding: 20px 0; }
    @media (prefers-reduced-motion: reduce) { .log li:first-child { animation: none; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">LA</div>
    <div><h1>Stunden melden</h1><div class="sub">Lern Academy · Zürich</div></div>
  </header>

  <div id="app"><div class="center">Lädt …</div></div>
  <div class="foot">Bei Fragen wende dich an die Lern Academy.</div>

  <script>
    // Public config (safe to expose): the publishable key + project URL.
    const SUPABASE_URL = 'https://bkyvxrakjmhcwwwgzwsq.supabase.co';
    const ANON_KEY = 'sb_publishable_VcpvUci4ThIkcGoexJtocQ_646RW64T';

    const app = document.getElementById('app');
    const token = new URLSearchParams(location.search).get('t') || '';
    let pensa = [];
    const logged = []; // lessons reported this session (for reassurance)

    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const deDate = (iso) => iso.split('-').reverse().join('.');
    const hrs = (m) => (m / 60).toLocaleString('de-CH', { maximumFractionDigits: 1 });

    function minuteOptions(selected) {
      let out = '';
      for (let m = 15; m <= 240; m += 5) out += `<option value="${m}"${m === selected ? ' selected' : ''}>${m} Min</option>`;
      return out;
    }

    async function rpc(fn, body) {
      let res;
      try {
        res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
          method: 'POST',
          headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}`, 'content-type': 'application/json' },
          body: JSON.stringify(body), cache: 'no-store',
        });
      } catch (e) { throw new Error('Keine Verbindung zum Server. Bist du online?'); }
      if (!res.ok) throw new Error(`Serverfehler bei „${fn}" (Code ${res.status}).`);
      return res.json();
    }

    function showError(msg) { app.innerHTML = `<div class="banner err">${esc(msg)}</div>`; }

    function render(tutorName, banner) {
      const opts = pensa.map((p) => `<option value="${esc(p.pensum_id)}">${esc(p.child_name || p.pensum_id)} · ${esc(p.subject)}</option>`).join('');
      app.innerHTML = `
        ${banner ? `<div class="banner good">${esc(banner)}</div>` : ''}
        <div class="card"><div class="greet">Hallo <b>${esc(tutorName)}</b> 👋
          <div class="muted" style="margin-top:4px">Melde jede gehaltene Lektion einzeln mit „Lektion melden".</div></div></div>
        ${pensa.length === 0
          ? `<div class="card muted">Aktuell sind dir keine aktiven Pensa zugewiesen.</div>`
          : `<div class="card">
              <div class="section-title">Lektion melden</div>
              <label>Pensum</label>
              <select id="pensum">${opts}</select>
              <div class="remain" id="remain"></div>
              <div class="row">
                <div><label>Datum</label><input type="date" id="date" /></div>
                <div><label>Dauer</label><select id="minutes">${minuteOptions(60)}</select></div>
              </div>
              <label>Was habt ihr gemacht? Allfällige Mitteilungen?</label>
              <textarea id="notes" placeholder="Kurz in Stichworten – z. B.:&#10;• Thema / Kapitel, Fortschritt, Hausaufgaben&#10;• Allfällige Mitteilung, z. B. „Schüler wird 2 Wochen Ferien machen“"></textarea>
              <div class="note-i">Dringende Mitteilungen bitte über WhatsApp (z. B. ab 3 Wochen Unterbruch).</div>
              <button class="btn-send" id="submit">Lektion melden</button>
              <div class="msg" id="msg"></div>
            </div>
            <div class="card">
              <div class="section-title">In dieser Sitzung gemeldet</div>
              <ul class="log" id="log"></ul>
              <div class="empty" id="empty">Noch nichts gemeldet.</div>
            </div>`}
      `;
      if (pensa.length > 0) wire();
    }

    function updateRemain() {
      const p = pensa.find((x) => x.pensum_id === document.getElementById('pensum').value);
      document.getElementById('remain').innerHTML = p ? `Verbleibendes Guthaben: <b>${hrs(p.remaining_minutes)} Std.</b>` : '';
    }

    function renderLog() {
      const ul = document.getElementById('log');
      ul.innerHTML = logged.map((e) => {
        const p = pensa.find((x) => x.pensum_id === e.pensum_id);
        return `<li><span class="what">${esc(p ? (p.child_name || p.pensum_id) : e.pensum_id)}</span>
          <span class="muted">${esc(deDate(e.date))} · ${e.minutes} Min</span><span class="tick">✓</span></li>`;
      }).join('');
      document.getElementById('empty').style.display = logged.length ? 'none' : 'block';
    }

    function wire() {
      const dateEl = document.getElementById('date');
      dateEl.value = new Date().toISOString().slice(0, 10);
      document.getElementById('pensum').onchange = updateRemain;
      document.getElementById('submit').onclick = submitOne;
      updateRemain();
      renderLog();
    }

    async function submitOne() {
      const btn = document.getElementById('submit');
      const pensum_id = document.getElementById('pensum').value;
      const date = document.getElementById('date').value;
      const minutes = parseInt(document.getElementById('minutes').value, 10);
      const notes = document.getElementById('notes').value.trim();
      if (!pensum_id || !date || !(minutes > 0)) return;

      btn.disabled = true; btn.textContent = 'Meldet …';
      try {
        const r = await rpc('portal_submit', { p_token: token, p_entries: [{ pensum_id, date, minutes, notes }] });
        if (!r || r.ok !== true || r.created !== 1) throw new Error('Melden fehlgeschlagen. Bitte erneut versuchen.');
        const p = pensa.find((x) => x.pensum_id === pensum_id);
        if (p) p.remaining_minutes = Math.max(0, p.remaining_minutes - minutes);
        logged.unshift({ pensum_id, date, minutes });
        renderLog(); updateRemain();
        btn.classList.add('ok'); btn.textContent = '✓ Gemeldet';
        const msg = document.getElementById('msg');
        msg.textContent = 'Lektion gemeldet. Du kannst gleich die nächste erfassen.'; msg.classList.add('show');
        setTimeout(() => { btn.classList.remove('ok'); btn.textContent = 'Lektion melden'; btn.disabled = false; }, 900);
        setTimeout(() => msg.classList.remove('show'), 2400);
        document.getElementById('minutes').value = '60';
        document.getElementById('notes').value = '';
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Lektion melden';
        const b = document.createElement('div');
        b.className = 'banner err'; b.textContent = e.message || 'Fehler beim Melden.';
        app.prepend(b);
      }
    }

    async function load(banner) {
      if (!token) return showError('Ungültiger Link — kein Zugangscode gefunden.');
      try {
        const data = await rpc('portal_get', { p_token: token });
        if (!data || data.ok !== true) return showError('Dieser Link ist ungültig oder wurde deaktiviert. Bitte wende dich an die Lern Academy.');
        pensa = data.pensa || [];
        render(data.tutor.name, banner);
      } catch (e) {
        showError(e.message || 'Verbindungsfehler. Bitte später erneut versuchen.');
      }
    }

    load();
  </script>
</body>
</html>
